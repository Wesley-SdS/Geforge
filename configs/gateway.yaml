server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

logging:
  level: info
  format: json

metrics:
  enabled: true
  path: /metrics

cors:
  allowed_origins: ["*"]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_headers: ["Content-Type", "Authorization", "X-Request-ID"]
  max_age: 86400

routes:
  - path: /api/users
    balance_strategy: weighted
    timeout: 10s
    targets:
      - url: http://upstream-1:3001
        weight: 3
      - url: http://upstream-2:3002
        weight: 1
    rate_limit:
      requests_per_second: 100
      burst: 20
    circuit_breaker:
      failure_threshold: 5
      reset_timeout: 30s
      half_open_max_requests: 3

  - path: /api/orders
    balance_strategy: round-robin
    timeout: 15s
    targets:
      - url: http://upstream-2:3002
    rate_limit:
      requests_per_second: 50
      burst: 10

  - path: /api/products
    balance_strategy: round-robin
    timeout: 10s
    targets:
      - url: http://upstream-3:3003
      - url: http://upstream-1:3001
